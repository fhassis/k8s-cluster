# Nexus prod overlay — real domain, TLS, external PostgreSQL.
# Sonatype strongly recommends PostgreSQL over embedded H2 in containerized prod.
# Deploy a PostgreSQL instance separately (e.g., via Bitnami chart) before enabling this.

nexus:
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

ingress:
  host: nexus.fhassis.top
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  tls:
    - hosts:
        - nexus.fhassis.top
      # secretName intentionally absent — Traefik uses TLSStore default (kube-system/wildcard-tls)

# External PostgreSQL connection.
# Uncomment and configure when PostgreSQL is available.
# nexus:
