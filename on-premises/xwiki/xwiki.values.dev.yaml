# XWiki dev overlay — localhost ingress, reduced resources.

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

ingress:
  hosts:
    - host: xwiki.localhost
      paths:
        - path: /
          pathType: Prefix
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
