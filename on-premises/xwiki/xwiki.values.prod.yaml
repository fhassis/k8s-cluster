# XWiki prod overlay — real domain, TLS, production resources.
# Replace xwiki.fhassis.top and wildcard-tls with your actual values.

postgresql:
  auth:
    password: ""   # set via external Secret in prod (do not commit passwords)

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "4Gi"

ingress:
  hosts:
    - host: xwiki.fhassis.top
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wildcard-tls
      hosts:
        - xwiki.fhassis.top
