# XWiki prod overlay — real domain, TLS, production resources.

postgresql:
  auth:
    password: ""   # set via external Secret in prod (do not commit passwords)

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "4Gi"

ingress:
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: xwiki.fhassis.top
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - xwiki.fhassis.top
      # secretName intentionally absent — Traefik uses TLSStore default (kube-system/wildcard-tls)
