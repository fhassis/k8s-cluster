# XWiki base values — xwiki-contrib/xwiki-helm chart.
# PostgreSQL is included as a Bitnami subchart.
# XWiki has no native Prometheus metrics endpoint (JMX only).
# Logs are collected automatically by Alloy via podLogsViaLoki.

image:
  tag: "lts-postgres"

persistence:
  enabled: true
  storageClass: longhorn
  size: 10Gi

# Chart default enables MySQL; disable it so XWiki connects to PostgreSQL instead.
mysql:
  enabled: false

postgresql:
  enabled: true
  auth:
    database: xwiki
    username: xwiki
    password: xwiki   # change in prod using a Kubernetes Secret
  primary:
    persistence:
      storageClass: longhorn
      size: 5Gi

ingress:
  enabled: true
  className: nginx
  # hostname overridden per environment
  hosts:
    - host: xwiki.localhost
      paths:
        - path: /
          pathType: Prefix
