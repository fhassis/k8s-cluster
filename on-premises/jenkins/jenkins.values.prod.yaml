# Jenkins prod overlay — real domain, TLS, production resource limits.

controller:
  jenkinsUrl: "https://jenkins.fhassis.top"

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  ingress:
    enabled: true
    ingressClassName: traefik
    hostName: jenkins.fhassis.top
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    tls:
      - hosts:
          - jenkins.fhassis.top
        # secretName intentionally absent — Traefik uses TLSStore default (kube-system/wildcard-tls)
