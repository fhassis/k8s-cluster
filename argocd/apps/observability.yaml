# Observability stack — ArgoCD Applications
#
# Five releases, deployed with sync waves to respect startup order:
#   Wave 0 — backends (Prometheus, Loki, Tempo): no inter-dependencies
#   Wave 1 — Grafana: pre-wired datasources require backends to be reachable
#   Wave 2 — k8s-monitoring: Alloy must remote-write to running backends
#
# All five use the multi-source pattern:
#   source[0] — Helm chart from its upstream Helm repo
#   source[1] — this git repo, referenced as $values, provides the values file
#
# targetRevision uses "*" (latest) for convenience in dev.
# Pin to a specific chart version (e.g. "27.3.1") for production.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/observability/prometheus.values.yaml
    - repoURL: https://github.com/fhassis/k3d-cluster.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
