# Observability stack — base Application manifests
#
# Five releases, deployed with sync waves to respect startup order:
#   Wave 0 — backends (Prometheus, Loki, Tempo): no inter-dependencies
#   Wave 1 — Grafana: pre-wired datasources require backends to be reachable
#   Wave 2 — k8s-monitoring: Alloy must remote-write to running backends
#
# Env-specific values (ingress, cluster name) are patched in by the
# dev/ and prod/ Kustomize overlays.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: "29.3.0"
      helm:
        valueFiles:
          - $values/observability/prometheus.values.yaml
    - repoURL: https://github.com/fhassis/k3d-cluster.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
