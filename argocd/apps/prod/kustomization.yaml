apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - longhorn.yaml                                      # prod: Longhorn block storage operator (wave -1)
patches:
  # draw.io and Excalidraw: add env-specific ingress (with sub_filter) as second source.
  - patch: |-
      - op: add
        path: /spec/sources/-
        value:
          repoURL: https://github.com/fhassis/k8s-cluster.git
          targetRevision: HEAD
          path: on-premises/drawio
          directory:
            include: "ingress.prod.yaml"
    target:
      kind: Application
      name: drawio
  - patch: |-
      - op: add
        path: /spec/sources/-
        value:
          repoURL: https://github.com/fhassis/k8s-cluster.git
          targetRevision: HEAD
          path: on-premises/excalidraw
          directory:
            include: "ingress.prod.yaml"
    target:
      kind: Application
      name: excalidraw
  # ingress-nginx: add prod TLS default cert overlay
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/nginx-ingress/ingress-nginx.values.prod.yaml
    target:
      kind: Application
      name: ingress-nginx
  # Observability env-specific values
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/observability/grafana.values.prod.yaml
    target:
      kind: Application
      name: grafana
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/observability/k8s-monitoring.values.prod.yaml
    target:
      kind: Application
      name: k8s-monitoring
  # On-premises tools — prod env-specific values (ingress, TLS, resource limits)
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/jenkins/jenkins.values.prod.yaml
    target:
      kind: Application
      name: jenkins
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/nexus/nexus.values.prod.yaml
    target:
      kind: Application
      name: nexus
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/xwiki/xwiki.values.prod.yaml
    target:
      kind: Application
      name: xwiki
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/sonarqube/sonarqube.values.prod.yaml
    target:
      kind: Application
      name: sonarqube
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/gitlab/gitlab.values.prod.yaml
    target:
      kind: Application
      name: gitlab
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/umami/umami.values.prod.yaml
    target:
      kind: Application
      name: umami
