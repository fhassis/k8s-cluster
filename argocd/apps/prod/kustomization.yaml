apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - certificates.yaml   # prod-only: Traefik TLSStore default cert (wave -1)
  - longhorn.yaml       # prod-only: Longhorn block storage operator (wave -1)
patches:
  # Observability env-specific values
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/observability/grafana.values.prod.yaml
    target:
      kind: Application
      name: grafana
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/observability/k8s-monitoring.values.prod.yaml
    target:
      kind: Application
      name: k8s-monitoring
  # On-premises tools — prod env-specific values (ingress, TLS, resource limits)
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/jenkins/jenkins.values.prod.yaml
    target:
      kind: Application
      name: jenkins
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/nexus/nexus.values.prod.yaml
    target:
      kind: Application
      name: nexus
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/xwiki/xwiki.values.prod.yaml
    target:
      kind: Application
      name: xwiki
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/gitlab/gitlab.values.prod.yaml
    target:
      kind: Application
      name: gitlab
