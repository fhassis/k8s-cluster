apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - dev-storage.yaml   # dev-only: shared-hostPath StorageClass + static PVs (wave -1)
patches:
  # Observability env-specific values
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/observability/grafana.values.dev.yaml
    target:
      kind: Application
      name: grafana
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/observability/k8s-monitoring.values.dev.yaml
    target:
      kind: Application
      name: k8s-monitoring
  # On-premises tools — dev env-specific values (ingress, resource limits)
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/jenkins/jenkins.values.dev.yaml
    target:
      kind: Application
      name: jenkins
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/nexus/nexus.values.dev.yaml
    target:
      kind: Application
      name: nexus
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/xwiki/xwiki.values.dev.yaml
    target:
      kind: Application
      name: xwiki
  - patch: |-
      - op: add
        path: /spec/sources/0/helm/valueFiles/-
        value: $values/on-premises/gitlab/gitlab.values.dev.yaml
    target:
      kind: Application
      name: gitlab
